name: CI

# Runs on every push to main and on every pull request.
# The pipeline FAILS (blocking) if linting, tests, or Terraform validation fail.
# It deliberately does NOT deploy to AWS -- deployment stays a manual, approved
# step.

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python — lint, syntax, tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (fail only on real errors, not style)
        run: |
          pip install ruff
          ruff check src tests --select E9,F63,F7,F82

      - name: Syntax check
        run: python -m compileall -q src

      - name: Run tests
        run: pytest -q

      - name: Security scan (non-blocking)
        continue-on-error: true
        run: |
          pip install bandit
          bandit -r src -q

  terraform:
    name: Terraform — format & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure
    steps:
      - uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Formatting check
        run: terraform fmt -check -recursive

      - name: Initialize (no backend, no AWS calls)
        run: terraform init -backend=false

      - name: Validate configuration
        run: terraform validate
