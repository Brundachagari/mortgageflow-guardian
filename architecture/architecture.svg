<svg viewBox="0 0 700 685" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<style>
.box{stroke-width:1.5;rx:8}
.t{font-size:13px;font-weight:600}
.ts{font-size:11px}
.gray{fill:#F1EFE8;stroke:#888780}
.gtext{fill:#2C2C2A}.gsub{fill:#5F5E5A}
.purple{fill:#EEEDFE;stroke:#534AB7}
.ptext{fill:#26215C}.psub{fill:#534AB7}
.green{fill:#EAF3DE;stroke:#3B6D11}.gntext{fill:#173404}.gnsub{fill:#3B6D11}
.amber{fill:#FAEEDA;stroke:#854F0B}.amtext{fill:#412402}.amsub{fill:#854F0B}
.red{fill:#FCEBEB;stroke:#A32D2D}.rtext{fill:#501313}.rsub{fill:#A32D2D}
.mut{fill:#5F5E5A}
</style>
<defs>
<marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M0 0 L10 5 L0 10 z" fill="#888780"/>
</marker>
</defs>

<text x="20" y="30" style="font-size:19px;font-weight:700" fill="#2C2C2A">MortgageFlow Guardian — architecture</text>
<text x="20" y="50" class="ts" fill="#5F5E5A">Event-driven AI document pipeline with retries, human review, and dead-letter recovery</text>
<text x="20" y="71" class="ts" fill="#5F5E5A">purple = compute / logic  ·  gray = storage &amp; queues  ·  green / amber / red = document outcome</text>

<rect x="14" y="130" width="672" height="520" rx="12" fill="none" stroke="#888780" stroke-width="1.5" stroke-dasharray="6 4"/>
<text x="24" y="152" class="ts mut">AWS cloud</text>
<text x="24" y="166" class="ts mut">boundary:</text>
<text x="24" y="180" class="ts mut">encryption,</text>
<text x="24" y="194" class="ts mut">least-priv IAM</text>

<rect x="230" y="88" width="240" height="44" class="box gray"/>
<text x="350" y="107" text-anchor="middle" class="t gtext">Document upload</text>
<text x="350" y="123" text-anchor="middle" class="ts gsub">synthetic pay stub (PDF / JSON)</text>

<rect x="230" y="150" width="240" height="44" class="box gray"/>
<text x="350" y="169" text-anchor="middle" class="t gtext">Amazon S3 (private)</text>
<text x="350" y="185" text-anchor="middle" class="ts gsub">encrypted · public access blocked</text>

<rect x="230" y="214" width="240" height="44" class="box gray"/>
<text x="350" y="233" text-anchor="middle" class="t gtext">Amazon SQS</text>
<text x="350" y="249" text-anchor="middle" class="ts gsub">buffers work · absorbs spikes</text>

<rect x="230" y="278" width="240" height="44" class="box purple"/>
<text x="350" y="297" text-anchor="middle" class="t ptext">AWS Step Functions</text>
<text x="350" y="313" text-anchor="middle" class="ts psub">orchestrates each step</text>

<rect x="230" y="342" width="240" height="44" class="box purple"/>
<text x="350" y="361" text-anchor="middle" class="t ptext">AWS Lambda — extract</text>
<text x="350" y="377" text-anchor="middle" class="ts psub">pluggable AI: Mock → Bedrock / Vertex</text>

<rect x="230" y="406" width="240" height="44" class="box purple"/>
<text x="350" y="425" text-anchor="middle" class="t ptext">Normalize + Validate</text>
<text x="350" y="441" text-anchor="middle" class="ts psub">one schema · fields · confidence</text>

<line x1="350" y1="132" x2="350" y2="148" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="194" x2="350" y2="212" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="258" x2="350" y2="276" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="322" x2="350" y2="340" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="386" x2="350" y2="404" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>

<path d="M470 356 C 548 346, 548 384, 472 376" fill="none" stroke="#7F77DD" stroke-width="2" marker-end="url(#ah)"/>
<text x="556" y="360" class="ts mut" style="font-size:10px">transient error</text>
<text x="556" y="374" class="ts mut" style="font-size:10px">retry 2s·4s·8s</text>

<line x1="350" y1="450" x2="145" y2="495" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="450" x2="350" y2="495" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>
<line x1="350" y1="450" x2="555" y2="495" stroke="#888780" stroke-width="2" marker-end="url(#ah)"/>

<rect x="30" y="498" width="200" height="64" class="box green"/>
<text x="130" y="520" text-anchor="middle" class="t gntext">PROCESSED</text>
<text x="130" y="538" text-anchor="middle" class="ts gnsub">confidence ≥ 90 · complete</text>
<text x="130" y="554" text-anchor="middle" class="ts gnsub">→ store in DynamoDB</text>

<rect x="250" y="498" width="200" height="64" class="box amber"/>
<text x="350" y="520" text-anchor="middle" class="t amtext">NEEDS_REVIEW</text>
<text x="350" y="538" text-anchor="middle" class="ts amsub">low confidence / missing field</text>
<text x="350" y="554" text-anchor="middle" class="ts amsub">→ DynamoDB + SNS alert</text>

<rect x="470" y="498" width="200" height="64" class="box red"/>
<text x="570" y="520" text-anchor="middle" class="t rtext">FAILED</text>
<text x="570" y="538" text-anchor="middle" class="ts rsub">permanent error / exhausted</text>
<text x="570" y="554" text-anchor="middle" class="ts rsub">→ SQS dead-letter queue</text>

<rect x="30" y="590" width="640" height="44" class="box gray"/>
<text x="350" y="609" text-anchor="middle" class="t gtext">Observability — Amazon CloudWatch</text>
<text x="350" y="625" text-anchor="middle" class="ts gsub">logs · metrics · alarms · dashboard — monitors every stage</text>
</svg>
